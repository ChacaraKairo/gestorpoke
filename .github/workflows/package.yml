name: Package installers

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  appimage:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y python3 make g++ libsqlite3-dev libfuse2
      - name: Install dependencies
        run: npm ci
      - name: Validate project
        run: npm run typecheck && npm run lint && npm test
      - name: Build AppImage
        run: npm run dist:linux
      - name: Verify AppImage artifact
        run: test -n "$(find dist -maxdepth 1 -type f -name '*.AppImage' -print -quit)"
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: GestorPoke-AppImage
          path: dist/*.AppImage
          if-no-files-found: error

  windows-installer:
    name: Build Windows NSIS installer
    runs-on: windows-latest
    timeout-minutes: 40
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Validate project
        run: npm run typecheck && npm run lint && npm test
      - name: Build NSIS installer
        run: npm run dist:win
      - name: Verify Windows installer artifact
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path dist -Filter *.exe | Select-Object -First 1
          if (-not $installer) { throw "Nenhum instalador .exe foi gerado." }
      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: GestorPoke-Windows
          path: dist/*.exe
          if-no-files-found: error
